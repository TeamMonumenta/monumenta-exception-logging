# Ingest endpoint for Minecraft servers

apiVersion: v1
kind: Service
metadata:
  name: exception-logger
spec:
  ports:
  - port: 80
    targetPort: 8080
  selector:
    app: exception-logger

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: exception-logger
  labels:
    app: exception-logger
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: exception-logger
  template:
    metadata:
      labels:
        app: exception-logger
    spec:
      volumes:
        - name: exception-logger-storage
          hostPath:
            type: Directory
            path: /path/to/exception-logger/data
      containers:
      - name: exception-logger
        image: ghcr.io/teammonumenta/monumenta-automation/monumenta-exception-logger:latest
        tty: false
        stdin: false
        volumeMounts:
        - name: exception-logger-storage
          mountPath: /data
        env:
        - name: DB_PATH
          value: /data/tracker.db
        # Comma-separated Java package prefixes used during fingerprinting.
        # Frames outside these packages are treated as library frames.
        - name: APP_PACKAGES
          value: com.playmonumenta
        # Number of days to retain exception groups and occurrences before purging.
        # Omit to use the default of 14 days.
        #- name: EXPIRY_DAYS
        #  value: "14"
        - name: PORT
          value: "8080"
        # Log a formatted entry to stdout for every ingest submission.
        # Set to "false" to reduce log verbosity in production.
        - name: VERBOSE
          value: "true"
        # Discord channel ID (integer) where exception alerts are posted.
        - name: DISCORD_CHANNEL
          value: "YOUR_CHANNEL_ID_HERE"
        # How often (seconds) the bot re-edits all tracked channel messages.
        - name: DISCORD_REFRESH_PERIOD_SECONDS
          value: "300"
        # Prefix prepended to all slash command names. Use when running multiple
        # bots in one Discord server to avoid command name collisions.
        # Example: "ex_play_" makes /new become /ex_play_new.
        # Omit or leave empty to use unprefixed command names.
        #- name: SLASH_COMMAND_PREFIX
        #  value: ""
        # Bot token loaded from a Kubernetes secret.
        # Create the secret with:
        #   kubectl create secret generic exception-logger --from-literal=discord-token='YOUR_TOKEN_HERE'
        - name: DISCORD_TOKEN
          valueFrom:
            secretKeyRef:
              name: exception-logger
              key: discord-token
        resources:
          limits:
            cpu: 250m
            memory: 256Mi
          requests:
            cpu: 50m
            memory: 64Mi
