apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pr-bot
  namespace: default
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - githubwebhook.playmonumenta.com
  rules:
  - host: githubwebhook.playmonumenta.com
    http:
      paths:
        - pathType: Prefix
          path: "/"
          backend:
            service:
              name: pr-bot
              port:
                number: 80
---
apiVersion: v1
kind: Service
metadata:
  name: pr-bot
  namespace: default
  labels:
    app: pr-bot
spec:
  type: ClusterIP
  selector:
    app: pr-bot
  ports:
  - name: http
    port: 80
    targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pr-bot
  namespace: default
  labels:
    app: pr-bot
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: pr-bot
  template:
    metadata:
      labels:
        app: pr-bot
    spec:
      volumes:
        - name: pr-bot-storage
          hostPath:
            type: Directory
            path: /nfs/pr-bot
      containers:
      - name: pr-bot
        image: ghcr.io/teammonumenta/monumenta-automation/pr-bot:latest
        imagePullPolicy: Always
        volumeMounts:
        - name: pr-bot-storage
          mountPath: /data
        env:
        - name: DB_PATH
          value: /data/prbot.db
        - name: DISCORD_CHANNEL
          value: "1050466266890109019"
        - name: GITHUB_REPOS
          value: "TeamMonumenta/monumenta-plugins,TeamMonumenta/monumenta-server-management,TeamMonumenta/monumenta-mixins,TeamMonumenta/library-of-souls,TeamMonumenta/scripted-quests,TeamMonumenta/monumenta-automation"
        - name: REACTION_MERGED
          value: "merged:1050492627692294204"
        - name: VERBOSE
          value: "false"
        - name: DISCORD_TOKEN
          valueFrom:
            secretKeyRef:
              name: pr-bot
              key: discord-token
        - name: GITHUB_WEBHOOK_SECRET
          valueFrom:
            secretKeyRef:
              name: pr-bot
              key: github-webhook-secret
        - name: GITHUB_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: pr-bot
              key: github-api-token
        ports:
        - containerPort: 8080
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 15
        resources:
          limits:
            cpu: 250m
            memory: 256Mi
          requests:
            cpu: 50m
            memory: 64Mi
